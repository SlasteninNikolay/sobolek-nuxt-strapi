name: sobolek-nuxt-strapi

services:
  sobolek-cms:
    build:
      context: ../cms
      dockerfile: ../prod-config/Dockerfile.cms
    volumes:
      - strapi_data:/usr/app/public
    restart: unless-stopped
    networks:
      - sobolnet
    # Для Portainer (убрать если используется .env)
    env_file:
      - stack.env
    environment:
      NODE_ENV: production

      # === STRAPI ===
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      STRAPI_TOKEN: ${NUXT_STRAPI_TOKEN}
      STRAPI_URL: ${STRAPI_SERVER_URL}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}

      # === БД ===
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_HOST: sobolek-db
      DATABASE_CLIENT: mysql
      DATABASE_PORT: 3306
      DATABASE_SSL: "false"

      # === SMTP НАСТРОЙКИ ===
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}

      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS}

      SMTP_TLS_MIN_VERSION: ${SMTP_TLS_MIN_VERSION}
      SMTP_TLS_MAX_VERSION: ${SMTP_TLS_MAX_VERSION}
      SMTP_TLS_CIPHERS: ${SMTP_TLS_CIPHERS}

      SMTP_DEFAULT_FROM: ${SMTP_DEFAULT_FROM}
      SMTP_DEFAULT_REPLY_TO: ${SMTP_DEFAULT_REPLY_TO}
      SMTP_TO_ADMIN: ${SMTP_TO_ADMIN}

      SEND_EMAILS: ${SEND_EMAILS}
      EMAIL_RATE_LIMIT: ${EMAIL_RATE_LIMIT}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT}

      EMAIL_DEBUG: ${EMAIL_DEBUG}
      EMAIL_LOGGER: ${EMAIL_LOGGER}
    depends_on:
      sobolek-db:
        condition: service_healthy

  sobolek-frontend:
    build:
      context: ../frontend
      dockerfile: ../prod-config/Dockerfile.frontend
      args:
        NODE_ENV: ${NODE_ENV}
        STRAPI_SERVER_URL: ${STRAPI_SERVER_URL}
        STRAPI_CLIENT_URL: ${STRAPI_CLIENT_URL}
        NUXT_STRAPI_TOKEN: ${NUXT_STRAPI_TOKEN}
    environment:
      STRAPI_SERVER_URL: ${STRAPI_SERVER_URL}
      STRAPI_CLIENT_URL: ${STRAPI_CLIENT_URL}
      NUXT_STRAPI_TOKEN: ${NUXT_STRAPI_TOKEN}
      NODE_ENV: production
    # Для Portainer (убрать если используется .env)
    env_file:
      - stack.env
    restart: unless-stopped
    networks:
      - sobolnet

  sobolek-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    env_file:
      - stack.env
    volumes:
      - db:/var/lib/mysql
    networks:
      - sobolnet
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DATABASE_USERNAME}", "-p${DATABASE_PASSWORD}" ]
      timeout: 20s
      retries: 10
      start_period: 40s
      interval: 10s

networks:
  sobolnet:
    driver: bridge

volumes:
  db:
  strapi_data: